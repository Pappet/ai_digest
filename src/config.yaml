# --- LLM Settings ---
llm:
  # Backend: "ollama" (local) or "openrouter" (cloud API)
  backend: "openrouter"

  # ── OpenRouter Settings (when backend: openrouter) ──
  # Get your API key at https://openrouter.ai/keys
  # Can also be set via OPENROUTER_API_KEY environment variable
  api_key: ""  # or set env var OPENROUTER_API_KEY

  # Stage 1: Fast model for relevance screening (runs on ALL articles)
  filter_model: "google/gemini-2.5-flash-lite"

  # Stage 2: Smarter model for summarization (runs on TOP articles only)
  summary_model: "minimax/minimax-m2.5"

  # Optional: your site name for OpenRouter dashboard tracking
  site_name: "AI Digest"

  # ── Ollama Settings (when backend: ollama) ──
  # Uncomment these and set backend: "ollama" to use local models
  # base_url: "http://localhost:11434"
  # filter_model: "qwen3:8b"
  # summary_model: "qwen3:30b"

  # ── Common Settings ──
  # How many articles pass from stage 1 → stage 2
  top_n: 15

  # Relevance threshold (0-10) – articles below this are discarded
  min_relevance: 4

  # Request timeout in seconds
  timeout: 120

# --- Email Settings ---
email:
  # SMTP server config
  smtp_host: "smtp.example.com"
  smtp_port: 587
  smtp_user: "your-email@example.com"
  smtp_password: "your-app-password"   # Use app passwords, not your real password!
  use_tls: true

  # Who gets the digest
  from_addr: "AI Digest <your-email@example.com>"
  to_addrs:
    - "you@example.com"

  # Subject line (supports {date} placeholder)
  subject: "🤖 AI Digest – {date}"

# --- General Settings ---
general:
  # SQLite database for deduplication
  db_path: "~/.ai-digest/articles.db"

  # How many days to look back for articles
  lookback_days: 1

  # Max articles to fetch per feed
  max_per_feed: 30

  # User-Agent for HTTP requests
  user_agent: "AI-Digest/1.0 (Personal News Aggregator)"

  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
